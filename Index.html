<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Recharge">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#e8725c">
<title>Recharge 自我充电</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf7f4;--bg-warm:#f5efe8;
  --card-bg:#fff;--card-border:rgba(0,0,0,.05);--card-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03);
  --coral:#e8725c;--coral-soft:rgba(232,114,92,.10);--coral-glow:rgba(232,114,92,.25);
  --amber:#d4943a;--amber-soft:rgba(212,148,58,.10);
  --sage:#6a9e7e;--sage-soft:rgba(106,158,126,.10);
  --plum:#9474b4;--plum-soft:rgba(148,116,180,.10);
  --sky:#5b94c4;--sky-soft:rgba(91,148,196,.10);
  --orange:#e09850;--orange-soft:rgba(224,152,80,.10);
  --text:#2c2420;--text-mid:#4a3f38;--text-dim:#6b5e56;--text-light:#8a7e74;
  --done-bg:#f0f7f2;--done-text:#9eb8a6;
  --radius:16px;--radius-sm:10px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:120px;overflow-x:hidden;background-image:url('bg.png');background-size:cover;background-position:center top;background-attachment:fixed;background-repeat:no-repeat;position:relative}
body::before{content:'';position:fixed;inset:0;background:linear-gradient(to bottom,rgba(250,247,244,0.88),rgba(250,247,244,0.75),rgba(250,247,244,0.55));pointer-events:none;z-index:0}
body>*{position:relative;z-index:1}

.header{padding:52px 24px 24px;position:relative;overflow:hidden;background:transparent}
.brand{display:flex;align-items:center;gap:12px;position:relative}
.brand-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--coral),var(--amber));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 2px 10px var(--coral-glow)}
.brand h1{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:0.5px;color:var(--text-mid)}
.brand h1 em{font-style:italic;color:var(--coral);font-weight:400}
.header .sub{font-size:14px;color:var(--text-dim);margin-top:6px;font-weight:400;padding-left:54px}

.energy{margin:0;background:transparent;padding:16px 24px 20px}
.energy-card{background:rgba(255,255,255,0.93);border-radius:var(--radius);padding:18px;box-shadow:var(--card-shadow);position:relative;overflow:hidden}
.energy-card::after{content:'⚡';position:absolute;right:16px;top:14px;font-size:32px;opacity:.08}
.energy-main{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.energy-label{font-size:13px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;font-weight:500}
.energy-pct{font-family:'Cormorant Garamond',serif;font-size:32px;color:var(--coral)}
.energy-pct small{font-family:'Noto Sans SC';font-size:14px;font-weight:400;color:var(--text-dim)}
.bar-track{height:8px;background:var(--bg-warm);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.25,1,.5,1);position:relative}
.bar-fill.main{background:linear-gradient(90deg,var(--coral),var(--amber))}
.bar-fill.main::after{content:'';position:absolute;right:0;top:0;bottom:0;width:20px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4));border-radius:0 4px 4px 0}
.dims{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px;margin-top:14px}
.dim{display:flex;flex-direction:column;gap:4px}
.dim-top{display:flex;justify-content:space-between;align-items:center}
.dim-label{font-size:13px;color:var(--text-dim);font-weight:500}
.dim-pct{font-size:13px;font-weight:600}
.dim-pct.body{color:var(--sage)}.dim-pct.look{color:var(--coral)}.dim-pct.exp{color:var(--plum)}.dim-pct.kids{color:var(--sky)}.dim-pct.food{color:var(--orange)}
.dim-bar{height:5px;background:var(--bg-warm);border-radius:3px;overflow:hidden}
.dim-fill{height:100%;border-radius:3px;transition:width .5s ease}
.dim-fill.body{background:var(--sage)}.dim-fill.look{background:var(--coral)}.dim-fill.exp{background:var(--plum)}.dim-fill.kids{background:var(--sky)}.dim-fill.food{background:var(--orange)}

.tomorrow{margin:0 24px 12px;background:linear-gradient(135deg,rgba(255,248,240,0.85),rgba(255,245,235,0.85));backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(232,114,92,.12);border-radius:var(--radius);padding:14px 16px;display:none}
.tomorrow.has-items{display:block}
.tomorrow-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.tomorrow-title{font-size:14px;font-weight:600;color:var(--coral)}
.tomorrow-clear{font-size:13px;color:var(--text-dim);background:none;border:none;cursor:pointer;font-family:inherit}
.tomorrow-items{display:flex;flex-direction:column;gap:4px}
.tomorrow-item{display:flex;align-items:center;gap:8px;font-size:14px;padding:8px 12px;background:white;border-radius:8px;border:1px solid rgba(0,0,0,.04)}
.t-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.t-dot.body{background:var(--sage)}.t-dot.look{background:var(--coral)}.t-dot.exp{background:var(--plum)}.t-dot.kids{background:var(--sky)}.t-dot.food{background:var(--orange)}
.t-name{flex:1;color:var(--text-mid)}.t-remove{font-size:14px;color:var(--text-light);background:none;border:none;cursor:pointer;padding:0 2px}

.kids-bar{margin:0 24px 12px;background:rgba(212,148,58,0.08);border:1px solid rgba(212,148,58,.15);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text-mid)}
.kids-bar select{background:white;border:1px solid rgba(212,148,58,.25);color:var(--amber);border-radius:6px;padding:6px 10px;font-size:14px;font-family:inherit;font-weight:500;outline:none;max-width:200px}
.kids-bar .hint{color:var(--amber);opacity:.7;font-size:12px;margin-left:auto}

.tabs{display:flex;margin:0 24px 12px;background:rgba(255,255,255,0.9);border-radius:var(--radius-sm);border:1px solid var(--card-border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{flex:0 0 auto;padding:10px 12px;font-size:13px;font-weight:500;text-align:center;color:var(--text-dim);cursor:pointer;border:none;background:none;font-family:inherit;white-space:nowrap;transition:all .2s}
.tab.active{background:var(--coral);color:white;border-radius:var(--radius-sm)}

.filters{padding:0 24px 8px;display:flex;flex-direction:column;gap:8px}
.filter-row-label{font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.5px;font-weight:500}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.chip{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--card-border);background:rgba(255,255,255,0.88);color:var(--text-dim);cursor:pointer;transition:all .2s;white-space:nowrap}
.chip:active{transform:scale(.95)}
.chip.a-all{background:var(--bg-warm);border-color:var(--text-light);color:var(--text-mid)}
.chip.a-area{background:var(--amber-soft);border-color:var(--amber);color:var(--amber)}

.sec-label{padding:16px 24px 6px;font-size:13px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.5px;font-weight:500}

/* PROJECT CARD */
.group{margin:0 24px 12px;animation:fadeUp .25s ease both;background:rgba(255,255,255,0.92);border-radius:var(--radius);box-shadow:var(--card-shadow);border:1px solid var(--card-border);overflow:hidden}
.group.done-group{background:var(--done-bg);box-shadow:none;border-color:transparent;opacity:.7}
.group-head{display:flex;align-items:center;gap:8px;padding:14px 16px;cursor:pointer}
.g-exp{font-size:11px;color:var(--text-dim);transition:transform .2s;display:inline-block}
.g-exp.open{transform:rotate(90deg)}
.g-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.g-dot.body{background:var(--sage)}.g-dot.look{background:var(--coral)}.g-dot.exp{background:var(--plum)}.g-dot.kids{background:var(--sky)}.g-dot.food{background:var(--orange)}
.g-title{font-size:16px;font-weight:600;color:var(--text-mid);flex:1}
.g-title.done-t{color:var(--done-text);text-decoration:line-through}
.g-count-label{font-size:13px;color:var(--text-dim);font-weight:400}
.g-tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:11px;padding:3px 8px;border-radius:10px;font-weight:500}
.tag-appt{background:var(--coral-soft);color:var(--coral)}.tag-date{background:var(--plum-soft);color:var(--plum)}.tag-walk{background:var(--sage-soft);color:var(--sage)}.tag-nearby{background:var(--amber-soft);color:var(--amber)}
.g-actions{display:flex;align-items:center;gap:5px}
.g-plan-btn{width:28px;height:28px;border-radius:8px;border:1.5px solid var(--text-light);background:none;color:var(--text-dim);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.g-plan-btn:active{transform:scale(.9)}
.g-plan-btn.planned{background:var(--coral);border-color:var(--coral);color:white}
.g-counter{display:flex;align-items:center;gap:2px}
.cnt-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--text-light);background:none;color:var(--text-dim);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cnt-btn:active{transform:scale(.88)}
.cnt-num{font-size:14px;font-weight:600;min-width:36px;text-align:center;color:var(--coral)}

/* SHOPS WRAP (inside card) */
.shops-wrap{display:none;padding:0 16px 14px;flex-direction:column;gap:8px}
.shops-wrap.open{display:flex}

/* SHOP SUB-CARD */
.sub-card{background:var(--bg-warm);border-radius:12px;padding:12px 14px;border:1px solid rgba(0,0,0,.04);transition:all .2s}
.sub-card.done-c{background:var(--done-bg);border-color:transparent}
.sub-card.done-c .s-name{color:var(--done-text);text-decoration:line-through}
.sub-card.nearby-highlight{border-color:var(--amber);border-width:1.5px;background:rgba(212,148,58,.04)}
.sub-top{display:flex;align-items:center;gap:10px}
.sub-info{flex:1;min-width:0}
.s-name-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.s-name{font-size:15px;font-weight:500}
.s-name a{color:var(--text);text-decoration:none;border-bottom:1px dashed var(--text-light)}
.s-area{font-size:11px;padding:2px 7px;border-radius:8px;background:var(--amber-soft);color:var(--amber);font-weight:500}
.s-note{font-size:13px;color:var(--text-dim);margin-top:3px;font-style:italic}
.s-check{width:30px;height:30px;border-radius:50%;border:2px solid var(--text-light);background:none;color:var(--text-light);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.s-check:active{transform:scale(.9)}
.s-check.checked{background:var(--sage);border-color:var(--sage);color:white}

.s-expand-btn{font-size:13px;color:var(--text-dim);background:none;border:none;cursor:pointer;font-family:inherit;margin-top:6px;padding:2px 0;display:flex;align-items:center;gap:3px}
.s-expand-btn .arr{font-size:10px;display:inline-block;transition:transform .2s}
.s-expand-btn.open .arr{transform:rotate(90deg)}
.s-guide{display:none;margin-top:6px}
.s-guide.show{display:block}
.s-guide textarea{width:100%;background:white;border:1px solid rgba(0,0,0,.06);border-radius:8px;padding:10px 12px;font-size:14px;color:var(--text);font-family:inherit;resize:vertical;outline:none;min-height:50px;line-height:1.6}
.s-guide textarea:focus{border-color:var(--coral)}
.s-guide-saved{font-size:14px;color:var(--text-dim);line-height:1.6;white-space:pre-wrap;padding:4px 0}

.g-note{margin:0;padding:10px 0 0;border-top:1px solid rgba(0,0,0,.04)}
.note-toggle{font-size:13px;color:var(--text-dim);background:none;border:none;cursor:pointer;font-family:inherit;padding:3px 0}
.note-input{width:100%;margin-top:4px;background:white;border:1px solid rgba(0,0,0,.06);border-radius:8px;padding:10px 12px;font-size:14px;color:var(--text);font-family:inherit;resize:none;outline:none;display:none}
.note-input:focus{border-color:var(--coral)}
.note-input.show{display:block}
.note-saved{font-size:14px;color:var(--text-dim);margin-top:3px;font-style:italic}

/* NAV BUTTON */
.s-nav{display:inline-flex;align-items:center;gap:3px;font-size:12px;padding:4px 10px;border-radius:6px;background:#3385ff;color:white;text-decoration:none;font-weight:500}

/* GEO BUTTON */
.geo-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:8px;border:1.5px solid var(--sage);background:var(--sage-soft);color:var(--sage);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.geo-btn:active{transform:scale(.95)}
.geo-btn.loading{opacity:.6;pointer-events:none}

.empty{text-align:center;padding:40px 20px;color:var(--text-dim)}
.empty .emoji{font-size:32px;margin-bottom:10px}
.empty p{font-size:13px;line-height:1.6}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* SHOP LINKS ROW */
.s-links{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap}
.s-link{font-size:12px;padding:4px 10px;border-radius:6px;text-decoration:none;display:inline-flex;align-items:center;gap:3px;font-weight:500}
.s-link.dzdp{background:#ff6633;color:white}
.s-link.xhs{background:#fe2c55;color:white}
.s-link-edit{font-size:13px;color:var(--text-dim);background:none;border:none;cursor:pointer;font-family:inherit;padding:3px 2px;margin-left:2px}

/* ADD SHOP BTN */
.add-shop-btn{width:100%;padding:12px;border:1.5px dashed var(--text-dim);border-radius:10px;background:none;color:var(--text-dim);font-size:14px;font-family:inherit;cursor:pointer;transition:all .2s;margin-top:2px}
.add-shop-btn:active{transform:scale(.98);border-color:var(--coral);color:var(--coral)}

/* PANEL OVERLAY */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:none;opacity:0;transition:opacity .25s}
.panel-overlay.show{display:block;opacity:1}

/* BOTTOM PANEL */
.panel{position:fixed;bottom:0;left:0;right:0;background:var(--card-bg);border-radius:20px 20px 0 0;z-index:101;transform:translateY(100%);transition:transform .3s cubic-bezier(.25,1,.5,1);max-height:85vh;overflow-y:auto;padding:20px 24px 36px;box-shadow:0 -4px 20px rgba(0,0,0,.1)}
.panel.show{transform:translateY(0)}
.panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.panel-title{font-size:16px;font-weight:600}
.panel-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--bg-warm);color:var(--text-dim);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.panel-field{margin-bottom:14px}
.panel-label{font-size:12px;color:var(--text-dim);font-weight:500;margin-bottom:4px;display:block}
.panel-input{width:100%;padding:10px 12px;border:1px solid rgba(0,0,0,.08);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;color:var(--text);background:var(--bg);outline:none}
.panel-input:focus{border-color:var(--coral)}
.panel-input::placeholder{color:var(--text-light)}
.panel-select{width:100%;padding:10px 12px;border:1px solid rgba(0,0,0,.08);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;color:var(--text);background:var(--bg);outline:none;appearance:none}
.panel-row{display:flex;gap:10px}
.panel-row .panel-field{flex:1}
.panel-actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.panel-btn{flex:1;padding:12px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s}
.panel-btn:active{transform:scale(.97)}
.panel-btn.primary{background:var(--coral);color:white}
.panel-btn.secondary{background:var(--bg-warm);color:var(--text-mid)}
.panel-btn.danger{background:rgba(221,68,68,0.08);color:#d44;font-size:13px;font-weight:600;padding:10px 14px;flex:1 1 100%;border:1.5px solid rgba(221,68,68,0.25);border-radius:var(--radius-sm);text-align:center;order:3}

/* Item panel cat buttons */
.panel-cats{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.panel-cat-btn{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;border:1.5px solid var(--card-border);background:var(--bg);color:var(--text-dim);cursor:pointer;font-family:inherit;transition:all .15s}
.panel-cat-btn:active{transform:scale(.95)}
.panel-cat-btn.sel-body{background:var(--sage-soft);border-color:var(--sage);color:var(--sage)}
.panel-cat-btn.sel-look{background:var(--coral-soft);border-color:var(--coral);color:var(--coral)}
.panel-cat-btn.sel-exp{background:var(--plum-soft);border-color:var(--plum);color:var(--plum)}
.panel-cat-btn.sel-kids{background:var(--sky-soft);border-color:var(--sky);color:var(--sky)}
.panel-cat-btn.sel-food{background:var(--orange-soft);border-color:var(--orange);color:var(--orange)}

/* Add item button */
.add-item-btn{margin:16px 24px;padding:16px;border:1.5px dashed var(--text-dim);border-radius:var(--radius);background:rgba(255,255,255,0.6);color:var(--text-dim);font-size:15px;font-weight:500;font-family:inherit;cursor:pointer;transition:all .2s;text-align:center;width:calc(100% - 48px)}
.add-item-btn:active{transform:scale(.98);border-color:var(--coral);color:var(--coral)}

/* Search bar */
.search-bar{margin:12px 24px 0;position:relative}
.search-input{width:100%;padding:10px 14px 10px 36px;border:1.5px solid var(--card-border);border-radius:12px;background:rgba(255,255,255,0.9);font-size:14px;font-family:inherit;color:var(--text);outline:none;box-sizing:border-box}
.search-input:focus{border-color:var(--coral);background:white}
.search-input::placeholder{color:var(--text-light)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text-light);pointer-events:none}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:16px;color:var(--text-light);cursor:pointer;padding:4px;display:none}
.search-clear.show{display:block}
</style>
</head>
<body>
<div class="header">
  <div class="brand"><div class="brand-icon">⚡</div><h1><em>Recharge</em> 自我充电</h1></div>
  <div class="sub">重庆 · 6/7 — 6/22 · 属于我的16天</div>
</div>

<div class="search-bar">
  <span class="search-icon">🔍</span>
  <input class="search-input" id="searchInput" type="text" placeholder="搜索项目、店铺、地址、攻略…" oninput="onSearch(this.value)">
  <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
</div>

<div class="energy"><div class="energy-card">
  <div class="energy-main"><span class="energy-label">总能量</span><span class="energy-pct" id="totalPct">0<small>%</small></span></div>
  <div class="bar-track"><div class="bar-fill main" id="totalBar" style="width:0%"></div></div>
  <div class="dims">
    <div class="dim"><div class="dim-top"><span class="dim-label">💪身体</span><span class="dim-pct body" id="dimBody">0%</span></div><div class="dim-bar"><div class="dim-fill body" id="barBody" style="width:0%"></div></div></div>
    <div class="dim"><div class="dim-top"><span class="dim-label">✨形象</span><span class="dim-pct look" id="dimLook">0%</span></div><div class="dim-bar"><div class="dim-fill look" id="barLook" style="width:0%"></div></div></div>
    <div class="dim"><div class="dim-top"><span class="dim-label">🎭体验</span><span class="dim-pct exp" id="dimExp">0%</span></div><div class="dim-bar"><div class="dim-fill exp" id="barExp" style="width:0%"></div></div></div>
    <div class="dim"><div class="dim-top"><span class="dim-label">👦带娃</span><span class="dim-pct kids" id="dimKids">0%</span></div><div class="dim-bar"><div class="dim-fill kids" id="barKids" style="width:0%"></div></div></div>
    <div class="dim"><div class="dim-top"><span class="dim-label">🍜美食</span><span class="dim-pct food" id="dimFood">0%</span></div><div class="dim-bar"><div class="dim-fill food" id="barFood" style="width:0%"></div></div></div>
  </div>
</div></div>

  {id:'cwtl',title:'川外小铁路徒步',cat:'kids',appt:false,type:'check',shops:[{name:'川外小铁路',area:'沙坪坝',addr:'梅林停车场',url:'',xhs:'',note:'免费 · 1号线烈士墓站2B口步行15min · 全程2km平坦',guide:'【川外小铁路 · 森系徒步路线】\n重庆市区内户外轻徒步宝藏地！不用出市区就能开启户外治愈之旅\n\n【交通】\n🚇 1号线烈士墓站2B口出站，步行约15分钟\n（觉得步行累也可以出站后坐公交车）\n🚗 自驾导航"梅林停车场"，停车后步行几分钟到入口\n⚠️ 停车提醒：工作日好停，周末不好停！评论区多人建议别开车\n\n【路线info】\n✅ 全程约2km，大半个小时就走完\n✅ 路况很好，基本是平坦道路\n✅ 对徒步小白超友好，老人小孩都能走～\n\n【三大亮点】\n1️⃣ 秋日森系氛围拉满：阳光透过枝叶缝隙洒下斑驳光影，满满森系氛围感🌿\n2️⃣ 复古小铁路：废弃的铁轨诉说着往昔的故事，仿佛能看到曾经列车穿梭的画面，拍照出片随意拿捏📸\n3️⃣ 神秘时光隧道：300多米长的隧道，充满了神秘浪漫\n\n💡 如果不尽兴，可以返回沿着铁轨一直走到梨树湾\n🎒 自己带点干粮和水，随时补充体力\n🚻 公卫较少要注意',myNotes:'',done:false}],note:'',pts:15},

// Map any area name to its life zone
function getZone(area){
  if(!area||area==='待定')return null;
  for(const[zn,z]of Object.entries(LIFE_ZONES)){
    if(z.areas.some(a=>area.includes(a)||a.includes(area)))return zn;
  }
  return null;
}

// Get coord for any area (via life zone center)
function getCoord(area){
  if(!area||area==='待定')return null;
  const zone=getZone(area);
  if(zone)return LIFE_ZONES[zone].coord;
  return null;
}

// Get life zone for an item (from its shops)
function getItemZones(it){
  const zones=new Set();
  it.shops.forEach(s=>{const z=getZone(s.area);if(z)zones.add(z)});
  return[...zones];
}

// Get life zone for a food item (parse address from foodGuide)
function getFoodZone(it){
  if(it.foodGuide){
    for(const[zn,z]of Object.entries(LIFE_ZONES)){
      if(z.areas.some(a=>it.foodGuide.includes(a)))return zn;
    }
  }
  return null;
}
function distKm(a,b){
  if(!a||!b)return 999;
  const R=6371,dLat=(b[0]-a[0])*Math.PI/180,dLon=(b[1]-a[1])*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function shopDist(shop,targetArea){
  const tc=getCoord(targetArea),sc=getCoord(shop.area);
  return distKm(tc,sc);
}
function closestShopDist(item,targetArea){
  if(!targetArea)return 999;
  return Math.min(...item.shops.map(s=>shopDist(s,targetArea)));
}

// Energy
function calcE(){
  const c={body:{d:0,t:0},look:{d:0,t:0},exp:{d:0,t:0},kids:{d:0,t:0},food:{d:0,t:0}};
  let tE=0,tP=0;
  items.forEach(it=>{const cat=c[it.cat];if(!cat)return;const p=it.pts||8;
    if(it.type==='counter'){const f=it.target>0?it.count/it.target:0;cat.d+=p*f;cat.t+=p;tE+=p*f}
    else{const d=isDone(it);cat.d+=d?p:0;cat.t+=p;tE+=d?p:0}
    tP+=p;});
  return{c,tE,tP};
}
function updateE(){
  const e=calcE();const tp=e.tP>0?Math.round(e.tE/e.tP*100):0;
  document.getElementById('totalPct').innerHTML=`${tp}<small>%</small>`;
  document.getElementById('totalBar').style.width=tp+'%';
  ['body','look','exp','kids','food'].forEach(k=>{
    const v=e.c[k];const p=v.t>0?Math.round(v.d/v.t*100):0;
    const C=k[0].toUpperCase()+k.slice(1);
    document.getElementById('dim'+C).textContent=p+'%';
    document.getElementById('bar'+C).style.width=p+'%';
  });
}

    }).join('');

    const showAllBtn=showOnlyClosest?`<button class="add-shop-btn" style="border-style:solid;font-size:11px;padding:8px" onclick="event.stopPropagation();showAllShops(this)">查看全部 ${sortedShops.length} 家 ▾</button>`:'';
    const addBtn=`<button class="add-shop-btn" onclick="event.stopPropagation();openAdd('${it.id}')">+ 添加店铺</button>`;

    let noteH='';
    if(it.note)noteH=`<div class="g-note"><div class="note-saved">"${it.note}"</div><button class="note-toggle" onclick="event.stopPropagation();openN('${it.id}')">✏️编辑</button><textarea class="note-input" id="n-${it.id}" rows="2" placeholder="感受…" onblur="saveN('${it.id}')">${it.note}</textarea></div>`;
    else noteH=`<div class="g-note"><button class="note-toggle" onclick="event.stopPropagation();openN('${it.id}')">💭写感受</button><textarea class="note-input" id="n-${it.id}" rows="2" placeholder="感受…" onblur="saveN('${it.id}')"></textarea></div>`;

    // Food items: no shop cards, just guide + note
    if(it.cat==='food'){
      const fg=(it.foodGuide||'').replace(/\\n/g,'\n');
      const hasFg=fg.trim();
      const fn=it.foodNotes||'';
      let foodGuideHTML='';
      if(hasFg){
        const fgLines=fg.split('\n');
        const fgFirst=fgLines[0]||'';
        const fgRest=fgLines.slice(1).join('\n');
        if(fgFirst.startsWith('🏷')){
          const dealName=fgFirst.replace('🏷 团购搜：','').replace('🏷','');
          foodGuideHTML=`<div style="background:linear-gradient(135deg,#fff3ed,#fff8f0);border:1.5px dashed var(--coral);border-radius:10px;padding:10px 12px;margin-bottom:10px"><div style="font-size:11px;color:var(--coral);font-weight:600;letter-spacing:1px;margin-bottom:4px">📋 大众点评搜索以下团购名称</div><div style="font-size:15px;font-weight:700;color:var(--text);line-height:1.4;padding:6px 8px;background:white;border-radius:6px;border:1px solid rgba(0,0,0,.06)">${dealName}</div></div><div class="s-guide-saved">${fgRest}</div>`;
        }else{
          foodGuideHTML=`<div class="s-guide-saved">${fg}</div>`;
        }
      }
      const foodContent=`<div style="margin-top:4px">
        <button class="s-expand-btn" onclick="event.stopPropagation();togGuide(this)"><span class="arr">▸</span>${hasFg?'📝 攻略/笔记':'📝 写笔记'}</button>
        <div class="s-guide">${foodGuideHTML}
        <div style="margin-top:8px"><div style="font-size:12px;color:var(--text-dim);margin-bottom:4px">${hasFg?'✏️ 我的笔记：':''}</div>
        <textarea placeholder="写你自己的笔记…" onblur="saveFoodNotes('${it.id}',this)">${fn}</textarea></div></div>
      </div>`;
      return`<div class="group"><div class="group-head" onclick="togGrp(this)"><span class="g-exp ${autoOpen?'open':''}">▸</span><div class="g-dot ${it.cat}"></div><div class="g-title ${done?'done-t':''}">${it.title}</div><div class="g-tags">${tags}</div><div class="g-actions">${right}</div></div><div class="shops-wrap ${autoOpen?'open':''}">${foodContent}${noteH}</div></div>`;
    }

    return`<div class="group"><div class="group-head" onclick="togGrp(this)"><span class="g-exp ${autoOpen?'open':''}">▸</span><div class="g-dot ${it.cat}"></div><div class="g-title ${done?'done-t':''}">${it.title}<span class="g-count-label"> · ${it.shops.length}家</span></div><div class="g-tags">${tags}</div><div class="g-actions">${right}</div></div><div class="shops-wrap ${autoOpen?'open':''}">${sc}${showAllBtn}${addBtn}${noteH}</div></div>`;
  }

  let h='';
  if(kidsArea){
    // Split nearby (<3km) vs far
    const nearUn=un.filter(i=>closestShopDist(i,kidsArea)<3);
    const farUn=un.filter(i=>closestShopDist(i,kidsArea)>=3);
    const nearWalk=nearUn.filter(i=>!i.appt);
    const nearAppt=nearUn.filter(i=>i.appt);
    if(nearWalk.length)h+=`<div class="sec-label">⚡ 3km内 · 随时去</div>${nearWalk.map(i=>rg(i,true)).join('')}`;
    if(nearAppt.length)h+=`<div class="sec-label">📍 3km内 · 需预约</div>${nearAppt.map(i=>rg(i,true)).join('')}`;
    const farWalk=farUn.filter(i=>!i.appt);
    const farAppt=farUn.filter(i=>i.appt);
    if(farWalk.length)h+=`<div class="sec-label">🚶 更远 · 随时去</div>${farWalk.map(i=>rg(i,false)).join('')}`;
    if(farAppt.length)h+=`<div class="sec-label">🔖 更远 · 需预约</div>${farAppt.map(i=>rg(i,false)).join('')}`;
  }else{if(un.length)h+=`<div class="sec-label">待打卡</div>${un.map(i=>rg(i,false)).join('')}`}
  if(dn.length)h+=`<div class="sec-label">已完成 ✨</div>${dn.map(i=>rg(i,false)).join('')}`;

  // Add item button
  const catLabels={all:'项目',body:'身体项目',look:'形象项目',exp:'体验项目',kids:'带娃项目',food:'美食项目'};
  h+=`<button class="add-item-btn" onclick="openAddItem()">+ 添加${catLabels[catFilter]||'项目'}</button>`;

  el.innerHTML=h;updateE();
}

// Interactions
function togGrp(head){head.querySelector('.g-exp').classList.toggle('open');head.nextElementSibling.classList.toggle('open')}
function showAllShops(btn){
  const wrap=btn.parentElement;
  wrap.querySelectorAll('[data-extra]').forEach(el=>el.style.display='');
  btn.remove();
}
function togShop(id,idx){const it=items.find(i=>i.id===id);if(it&&it.shops[idx]!==undefined){it.shops[idx].done=!it.shops[idx].done;save();render()}}
function togFood(id){const it=items.find(i=>i.id===id);if(it){it.done=!it.done;save();render()}}
function saveFoodGuide(id,ta){const it=items.find(i=>i.id===id);if(it){it.foodGuide=ta.value.trim();save();}}
function saveFoodNotes(id,ta){const it=items.find(i=>i.id===id);if(it){it.foodNotes=ta.value.trim();save();}}

// Open app with fallback to web URL
function openApp(scheme,webUrl){
  // On iOS, just open the web URL directly - it will trigger Universal Link if app is installed
  window.location.href=webUrl;
}
function chgCnt(id,d){const it=items.find(i=>i.id===id);if(it){it.count=Math.max(0,Math.min(it.target,it.count+d));save();render()}}
function togGuide(btn){btn.classList.toggle('open');const g=btn.nextElementSibling;g.classList.toggle('show')}
function saveG(id,idx,ta){const it=items.find(i=>i.id===id);if(it&&it.shops[idx]!==undefined){it.shops[idx].guide=ta.value.trim();save()}}
function saveNotes(id,idx,ta){const it=items.find(i=>i.id===id);if(it&&it.shops[idx]!==undefined){it.shops[idx].myNotes=ta.value.trim();save()}}
function openN(id){const t=document.getElementById('n-'+id);t.classList.toggle('show');if(t.classList.contains('show'))t.focus()}
function saveN(id){const t=document.getElementById('n-'+id);const it=items.find(i=>i.id===id);if(it){it.note=t.value.trim();save();setTimeout(()=>render(),100)}}

// === PANEL (Add/Edit Shop) ===
let panelMode='add',panelItemId='',panelShopIdx=-1;

function populateAreaDatalist(){
  const dl=document.getElementById('areaList');
  const areas=allAreas();
  dl.innerHTML=areas.map(a=>`<option value="${a}">`).join('');
}

function openAdd(itemId){
  panelMode='add';panelItemId=itemId;panelShopIdx=-1;
  document.getElementById('panelTitle').textContent='添加店铺';
  document.getElementById('pName').value='';
  document.getElementById('pArea').value='';
  document.getElementById('pAddr').value='';
  document.getElementById('pDzdp').value='';
  document.getElementById('pXhs').value='';
  document.getElementById('pNote').value='';
  document.getElementById('pDel').style.display='none';
  populateAreaDatalist();
  showPanel();
}

function openEdit(itemId,shopIdx){
  panelMode='edit';panelItemId=itemId;panelShopIdx=shopIdx;
  const it=items.find(i=>i.id===itemId);
  if(!it||!it.shops[shopIdx])return;
  const s=it.shops[shopIdx];
  document.getElementById('panelTitle').textContent='编辑店铺';
  document.getElementById('pName').value=s.name||'';
  document.getElementById('pArea').value=s.area||'';
  document.getElementById('pAddr').value=s.addr||'';
  document.getElementById('pDzdp').value=s.url||'';
  document.getElementById('pXhs').value=s.xhs||'';
  document.getElementById('pNote').value=s.note||'';
  document.getElementById('pDel').style.display='block';
  populateAreaDatalist();
  showPanel();
}

function showPanel(){
  document.getElementById('panelOverlay').classList.add('show');
  document.getElementById('panel').classList.add('show');
  document.body.style.overflow='hidden';
  setTimeout(()=>document.getElementById('pName').focus(),300);
}

function closePanel(){
  document.getElementById('panelOverlay').classList.remove('show');
  document.getElementById('panel').classList.remove('show');
  document.body.style.overflow='';
}

function savePanel(){
  const name=document.getElementById('pName').value.trim();
  if(!name){document.getElementById('pName').style.borderColor='#d44';return}
  const area=document.getElementById('pArea').value.trim()||'待定';
  const addr=document.getElementById('pAddr').value.trim();
  const url=document.getElementById('pDzdp').value.trim();
  const xhs=document.getElementById('pXhs').value.trim();
  const note=document.getElementById('pNote').value.trim();

  const it=items.find(i=>i.id===panelItemId);
  if(!it)return;

  if(panelMode==='add'){
    it.shops.push({name,area,addr,url,xhs,note,guide:'',done:false});
  }else{
    const s=it.shops[panelShopIdx];
    if(s){s.name=name;s.area=area;s.addr=addr;s.url=url;s.xhs=xhs;s.note=note}
  }
  save();closePanel();buildChips();render();
}

function delShop(){
  if(!confirm('确定删除这家店铺？'))return;
  const it=items.find(i=>i.id===panelItemId);
  if(it&&it.shops[panelShopIdx]!==undefined){
    it.shops.splice(panelShopIdx,1);
    if(it.shops.length===0)it.shops.push({name:'待找店',area:'待定',url:'',xhs:'',note:'',guide:'',done:false});
    save();closePanel();buildChips();render();
  }
}

// === ITEM PANEL (Add/Edit Item) ===
let itemPanelMode='add',editItemId='',selectedCat='';
const CAT_PTS={body:20,look:10,exp:15,kids:15,food:8};

function pickCat(cat){
  selectedCat=cat;
  document.querySelectorAll('.panel-cat-btn').forEach(b=>{
    b.className='panel-cat-btn';
    if(b.dataset.cat===cat)b.classList.add('sel-'+cat);
  });
}

function toggleTarget(){
  const isCounter=document.querySelector('input[name="iType"]:checked').value==='counter';
  document.getElementById('iTarget').style.display=isCounter?'block':'none';
}

function openAddItem(){
  itemPanelMode='add';editItemId='';
  document.getElementById('itemPanelTitle').textContent='添加项目';
  document.getElementById('iName').value='';
  document.querySelector('input[name="iType"][value="check"]').checked=true;
  toggleTarget();
  document.getElementById('iAppt').checked=false;
  document.getElementById('iTarget').value='5';
  document.getElementById('iDel').style.display='none';
  // Pre-select category if on a specific tab
  selectedCat=catFilter!=='all'?catFilter:'';
  document.querySelectorAll('.panel-cat-btn').forEach(b=>{
    b.className='panel-cat-btn';
    if(selectedCat&&b.dataset.cat===selectedCat)b.classList.add('sel-'+selectedCat);
  });

  document.getElementById('itemPanel').classList.add('show');
  document.body.style.overflow='hidden';
  setTimeout(()=>document.getElementById('iName').focus(),300);
}

function closeItemPanel(){
  document.getElementById('itemPanelOverlay').classList.remove('show');
  document.getElementById('itemPanel').classList.remove('show');
  document.body.style.overflow='';
}

function saveItem(){
  const name=document.getElementById('iName').value.trim();
  if(!name){document.getElementById('iName').style.borderColor='#d44';return}
  if(!selectedCat){alert('请选择分类');return}
  const isCounter=document.querySelector('input[name="iType"]:checked').value==='counter';
  const target=isCounter?parseInt(document.getElementById('iTarget').value)||5:0;
  const appt=document.getElementById('iAppt').checked;

  if(itemPanelMode==='add'){
    const id='custom_'+Date.now();
    const newItem={
      id,title:name,cat:selectedCat,appt,
      type:isCounter?'counter':'check',
      target:isCounter?target:0,count:0,
      shops:[{name:'待找店',area:'待定',url:'',xhs:'',note:'',guide:'',done:false}],
      note:'',pts:CAT_PTS[selectedCat]||10
    };
    if(isCounter) newItem.eventDate=undefined;
    items.push(newItem);
  } else {
    const it=items.find(i=>i.id===editItemId);
    if(it){
      it.title=name;it.cat=selectedCat;it.appt=appt;
      it.type=isCounter?'counter':'check';
      if(isCounter){it.target=target;if(!it.count)it.count=0}
      it.pts=CAT_PTS[selectedCat]||10;
    }
  }
  save();closeItemPanel();render();
}

function openEditItem(id){
  const it=items.find(i=>i.id===id);
  if(!it)return;
  itemPanelMode='edit';editItemId=id;
  document.getElementById('itemPanelTitle').textContent='编辑项目';
  document.getElementById('iName').value=it.title;
  selectedCat=it.cat;
  document.querySelectorAll('.panel-cat-btn').forEach(b=>{
    b.className='panel-cat-btn';
    if(b.dataset.cat===selectedCat)b.classList.add('sel-'+selectedCat);
  });
  if(it.type==='counter'){
    document.querySelector('input[name="iType"][value="counter"]').checked=true;
    document.getElementById('iTarget').value=it.target||5;
  }else{
    document.querySelector('input[name="iType"][value="check"]').checked=true;
  }
  toggleTarget();
  document.getElementById('iAppt').checked=it.appt||false;
  document.getElementById('iDel').style.display='block';
  document.getElementById('itemPanelOverlay').classList.add('show');
  document.getElementById('itemPanel').classList.add('show');
  document.body.style.overflow='hidden';
}

function delItem(){
  if(!confirm('确定删除这个项目？所有店铺和打卡记录都会丢失。'))return;
  items=items.filter(i=>i.id!==editItemId);
  planned=planned.filter(p=>p!==editItemId);
  save();savePlan();closeItemPanel();renderTmrw();render();
}

// === FILTER EVENTS ===
document.getElementById('areaFilters').addEventListener('click',e=>{const c=e.target.closest('.chip');if(!c)return;areaFilter=c.dataset.area;buildChips();render()});
document.getElementById('kidsAct').addEventListener('change',e=>{
  kidsArea=e.target.value||'';
  myGPS=null; // clear GPS when switching to preset
  document.getElementById('geoBtn').textContent='📍 我的位置';
  render();
});

// === GEOLOCATION ===
let myGPS=null;
function getMyLocation(){
  const btn=document.getElementById('geoBtn');
  btn.classList.add('loading');btn.textContent='定位中…';
  if(!navigator.geolocation){btn.textContent='不支持定位';btn.classList.remove('loading');return}
  navigator.geolocation.getCurrentPosition(pos=>{
    myGPS=[pos.coords.latitude,pos.coords.longitude];
    btn.classList.remove('loading');btn.textContent='📍 已定位';
    // Clear preset selection
    document.getElementById('kidsAct').value='';
    kidsArea='__gps__';
    render();
  },err=>{
    btn.classList.remove('loading');btn.textContent='📍 定位失败';
    setTimeout(()=>{btn.textContent='📍 我的位置'},2000);
  },{enableHighAccuracy:true,timeout:10000});
}

// Override distance functions to support GPS
const _origShopDist=shopDist;
shopDist=function(shop,targetArea){
  if(targetArea==='__gps__'&&myGPS){
    const sc=getCoord(shop.area);
    return distKm(myGPS,sc);
  }
  return _origShopDist(shop,targetArea);
};
const _origClosest=closestShopDist;
closestShopDist=function(item,targetArea){
  if(targetArea==='__gps__'&&myGPS){
    return Math.min(...item.shops.map(s=>{const sc=getCoord(s.area);return distKm(myGPS,sc)}));
  }
  return _origClosest(item,targetArea);
};

// Register Service Worker for offline support
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

// === SEARCH ===
let searchQuery='';
function onSearch(val){
  searchQuery=val.trim().toLowerCase();
  document.getElementById('searchClear').classList.toggle('show',searchQuery.length>0);
  render();
}
function clearSearch(){
  searchQuery='';
  document.getElementById('searchInput').value='';
  document.getElementById('searchClear').classList.remove('show');
  render();
}
function matchesSearch(it){
  if(!searchQuery)return true;
  const q=searchQuery;
  // Search title
  if(it.title.toLowerCase().includes(q))return true;
  // Search shops: name, area, addr, note, guide, myNotes
  if(it.shops&&it.shops.some(s=>{
    if(s.name&&s.name.toLowerCase().includes(q))return true;
    if(s.area&&s.area.toLowerCase().includes(q))return true;
    if(s.addr&&s.addr.toLowerCase().includes(q))return true;
    if(s.note&&s.note.toLowerCase().includes(q))return true;
    if(s.guide&&s.guide.toLowerCase().includes(q))return true;
    if(s.myNotes&&s.myNotes.toLowerCase().includes(q))return true;
    return false;
  }))return true;
  // Search foodGuide and foodNotes
  if(it.foodGuide&&it.foodGuide.toLowerCase().includes(q))return true;
  if(it.foodNotes&&it.foodNotes.toLowerCase().includes(q))return true;
  // Search item note
  if(it.note&&it.note.toLowerCase().includes(q))return true;
  return false;
}

buildChips();renderTmrw();render();
