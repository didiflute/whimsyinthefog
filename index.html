<style>
:root {
  --bg: #F9F6F1;
  --bg-card: #FDFCFA;
  --bg-detail: #F5F2EC;
  --text-1: #3D3530;
  --text-2: #7A6E62;
  --text-3: #9B8F82;
  --border: #E8E2DA;
  --border-light: #F0EBE4;
  --font-en: 'Cormorant Garamond', 'Georgia', serif;
  --font-zh: 'Noto Serif SC', 'Songti SC', serif;
  --font: var(--font-zh), var(--font-en);
  --r: 14px;
  --r-pill: 50px;
  --shadow: 0 1px 4px rgba(61,53,48,0.04);
  /* category palette — muted, foggy tones */
  --c-craft: #C2927A;
  --c-dance: #B07A93;
  --c-show: #8B7E9B;
  --c-music: #6B8F6B;
  --c-food: #B89B5E;
  --c-family: #6B859B;
  --c-wellness: #7BA68E;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1C1A17;
    --bg-card: #262320;
    --bg-detail: #1F1D1A;
    --text-1: #E8E2DA;
    --text-2: #A89C8F;
    --text-3: #7D766D;
    --border: rgba(232,226,218,0.1);
    --border-light: rgba(232,226,218,0.06);
    --shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text-1);
  min-height: 100vh;
  min-height: 100dvh;
  padding-bottom: 68px;
  -webkit-font-smoothing: antialiased;
}
.app { max-width:480px; margin:0 auto; padding:0 16px; }

/* header */
.hdr { padding:20px 0 14px; display:flex; justify-content:space-between; align-items:flex-start; }
.hdr-en { font-family:var(--font-en); font-size:11px; letter-spacing:3px; color:var(--text-3); font-weight:300; margin-bottom:3px; }
.hdr-zh { font-family:var(--font-zh); font-size:26px; font-weight:300; color:var(--text-1); letter-spacing:2px; }
.hdr-sub { font-family:var(--font-en); font-size:12px; color:var(--text-3); margin-top:3px; font-style:italic; font-weight:300; letter-spacing:0.3px; }
.lang-btn {
  margin-top:6px; padding:4px 14px; border-radius:var(--r-pill);
  border:1px solid var(--border); background:transparent;
  color:var(--text-2); font-size:11px; cursor:pointer;
  font-family:var(--font-en); letter-spacing:1px; font-weight:400;
}
.lang-btn:active { transform:scale(0.95); }

/* search row */
.search-row { display:flex; gap:8px; margin-bottom:14px; align-items:center; }
.search-wrap { position:relative; flex:1; }
.search-wrap svg { position:absolute; left:14px; top:50%; transform:translateY(-50%); width:14px; height:14px; color:var(--text-3); pointer-events:none; }
.search-input {
  width:100%; padding:10px 14px 10px 36px; border-radius:var(--r-pill);
  border:1px solid var(--border); background:var(--bg-card);
  font-size:13px; font-family:var(--font); color:var(--text-1);
  outline:none; font-weight:300;
}
.search-input:focus { border-color:var(--text-3); }
.search-input::placeholder { color:var(--text-3); font-style:italic; }
.qbtns { display:flex; gap:6px; flex-shrink:0; }
.qbtn {
  padding:8px 13px; border-radius:var(--r-pill); border:none; cursor:pointer;
  font-size:12px; font-family:var(--font); background:var(--bg-card);
  color:var(--text-2); box-shadow:var(--shadow); white-space:nowrap; font-weight:400;
}
.qbtn:active { transform:scale(0.95); }
.qbtn.q-wk { background:#C2927A; color:#FFF8F2; }
.qbtn.q-tn { background:#8B7E9B; color:#F5F0FA; }

/* calendar bar */
.cal { background:linear-gradient(135deg,rgba(139,126,155,0.06),rgba(194,146,122,0.06)); border:1px solid rgba(139,126,155,0.1); border-radius:var(--r); padding:14px 16px; margin-bottom:14px; }
.cal-t { font-family:var(--font-en); font-size:10px; letter-spacing:2.5px; color:#6B5E80; margin-bottom:8px; font-weight:500; }
.cal-i { display:flex; align-items:center; gap:8px; padding:4px 0; font-size:13px; }
.cal-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.cal-d { color:#6B5E80; min-width:72px; font-size:12px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-weight:600; letter-spacing:0.2px; }
.cal-n { flex:1; font-weight:400; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.cal-u { font-size:11px; color:#B5443B; font-weight:600; flex-shrink:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }

/* tabs */
.tabs { display:flex; gap:6px; overflow-x:auto; padding-bottom:6px; margin-bottom:8px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.tabs::-webkit-scrollbar { display:none; }
.tab {
  flex-shrink:0; padding:6px 16px; border-radius:var(--r-pill); border:1px solid var(--border);
  cursor:pointer; font-size:12px; font-family:var(--font); background:transparent;
  color:var(--text-2); font-weight:400;
}
.tab:active { transform:scale(0.95); }
.tab.on { background:var(--text-1); color:var(--bg); border-color:var(--text-1); }

/* filters */
.flts { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:14px; }
.flt {
  padding:3px 10px; border-radius:var(--r-pill); border:1.5px solid transparent;
  cursor:pointer; font-size:11px; font-family:var(--font); font-weight:400;
}
.flt:active { transform:scale(0.95); }
.flt.on { border-color:currentColor; }
.flt-clr { padding:3px 10px; border-radius:var(--r-pill); border:1.5px solid #B5443B; cursor:pointer; font-size:11px; background:#FAE8E8; color:#B5443B; font-family:var(--font); }

/* cards */
.cds { display:flex; flex-direction:column; gap:12px; }
.cd {
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r);
  overflow:hidden; box-shadow:var(--shadow); border-left:3px solid transparent;
}
.cd.exp { opacity:0.4; filter:grayscale(0.35); }
.cd-sum { padding:14px 16px; cursor:pointer; }
.cd-r1 { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:3px; }
.cd-nm { font-size:15px; font-weight:400; flex:1; line-height:1.4; }
.cd-ex { font-size:10px; color:var(--text-3); font-weight:300; }
.cd-da { flex-shrink:0; text-align:right; }
.cd-db { font-size:12px; font-weight:600; white-space:nowrap; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; letter-spacing:0.3px; }
.cd-db.ongoing { color:#436335; }
.cd-db.timed { color:#6B5E80; }
.cd-db.dead { color:var(--text-3); }
.cd-urg { font-size:11px; color:#B5443B; font-weight:600; margin-top:2px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
.cd-ven { font-size:12px; color:var(--text-2); margin-bottom:3px; font-weight:400; }
.cd-meta { font-size:12px; color:var(--text-2); margin-bottom:6px; font-weight:400; }
.cd-tags { display:flex; align-items:center; justify-content:space-between; gap:4px; }
.cd-tl { display:flex; gap:4px; flex-wrap:wrap; align-items:center; }
.pill { font-size:10px; padding:2px 8px; border-radius:var(--r-pill); font-weight:400; white-space:nowrap; }
.lead { font-size:10px; padding:2px 8px; border-radius:var(--r-pill); background:#FAE8EB; color:#6E3346; font-weight:400; }
.cd-hint { font-size:11px; color:var(--text-3); flex-shrink:0; margin-left:8px; font-weight:300; }

/* card detail */
.cd-det { border-top:1px solid var(--border-light); padding:14px 16px; background:var(--bg-detail); }
.det-r { font-size:13px; color:var(--text-2); margin-bottom:6px; line-height:1.5; font-weight:300; }
.det-note { font-size:13px; color:var(--text-1); margin-bottom:10px; line-height:1.8; font-weight:300; }
.det-addr { margin-bottom:10px; }
.det-addr a { font-size:12px; color:#6B859B; text-decoration:none; display:inline-flex; align-items:center; gap:5px; font-weight:400; }
.det-foot { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.det-links { display:flex; gap:6px; }
.lnk {
  font-size:12px; text-decoration:none; padding:5px 13px; border-radius:var(--r-pill); font-weight:400;
  font-family:var(--font);

.lnk:active { opacity:0.7; }
.lnk-w { color:#4A6585; background:rgba(74,101,133,0.08); }
.lnk-x { color:#FE2C55; background:rgba(254,44,85,0.06); }
.st-sel {

  cursor:pointer; font-weight:400; font-family:var(--font);
  appearance:none; -webkit-appearance:none;

/* empty */
.empty { text-align:center; padding:3rem 1rem; color:var(--text-3); font-size:14px; font-style:italic; display:none; font-weight:300; }

/* status bar */
.sbar {
  position:fixed; bottom:0; left:0; right:0;

  z-index:100;

.sbar-in { max-width:480px; margin:0 auto; display:flex; }
.sb { flex:1; text-align:center; cursor:pointer; padding:4px 0; }
.sb:active { transform:scale(0.95); }
.sb-d { width:1px; background:var(--border); align-self:stretch; }
.sb-n { font-size:18px; font-weight:600; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
.sb-l { font-size:11px; margin-top:1px; font-weight:300; }
.sb-0 .sb-n { color:#5C4E30; } .sb-0 .sb-l { color:#7A6E62; }
.sb-1 .sb-n { color:#2E4F6E; } .sb-1 .sb-l { color:#4A6585; }
.sb-2 .sb-n { color:#3D5A2D; } .sb-2 .sb-l { color:#5A7247; }

@keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
.cd { animation: fadeUp 0.2s ease-out; }
</style>

/* ========== STATE ========== */
let cat='all', tag=null, q='', sf=null, eid=null, qm=null, sd={};
const NOW=new Date(), SK='fogwhimsy_v1';
try{const s=localStorage.getItem(SK);if(s)sd=JSON.parse(s);}catch(e){}
A.forEach(a=>{if(sd[a.id])a.status=sd[a.id];});
function save(){const d={};A.forEach(a=>d[a.id]=a.status);try{localStorage.setItem(SK,JSON.stringify(d));}catch(e){}}

/* ========== HELPERS ========== */
function tx(o){return typeof o==='string'?o:(o[L]||o.zh);}
function isX(a){if(!a.deadline&&!a.dateEnd)return false;return new Date(a.dateEnd||a.deadline)<NOW;}
function dTo(d){if(!d)return null;return Math.ceil((new Date(d)-NOW)/864e5);}
function gm(addr){return 'https://maps.google.com/?q='+encodeURIComponent(addr);}
function fs(d){if(!d)return '';const x=new Date(d);return(x.getMonth()+1)+'/'+x.getDate();}
function db(a){
  if(a.dateStart&&a.dateEnd)return fs(a.dateStart)+' – '+fs(a.dateEnd);
  if(a.dateStart)return fs(a.dateStart)+' '+I.frm[L];
  if(a.deadline)return I.by[L]+' '+fs(a.deadline);
  if(a.tags.includes('ongoing'))return I.any[L];
  return '';
}
function gc(id){const c=CATS.find(x=>x.id===id);return c?c.c:'#888';}

/* ========== FILTER ========== */
function gF(){
  let l=[...A];
  if(cat!=='all')l=l.filter(a=>a.cat===cat);
  if(tag)l=l.filter(a=>a.tags.includes(tag));
  if(sf)l=l.filter(a=>a.status===sf);
  if(qm==='wk')l=l.filter(a=>!isX(a)&&(a.tags.includes('ongoing')||a.tags.includes('walkin'))&&a.tags.includes('single'));
  if(qm==='tn')l=l.filter(a=>!isX(a)&&(a.tags.includes('ongoing')||a.tags.includes('walkin'))&&a.tags.includes('single')&&(a.lead==='anytime'||a.lead==='1week'));
  if(q){const s=q.toLowerCase();l=l.filter(a=>tx(a.name).toLowerCase().includes(s)||tx(a.venue).toLowerCase().includes(s)||a.addr.toLowerCase().includes(s)||(a.note&&tx(a.note).toLowerCase().includes(s)));}
  l.sort((a,b)=>{const ea=isX(a),eb=isX(b);if(ea!==eb)return ea?1:-1;const da=a.deadline?new Date(a.deadline):new Date('9999-12-31');const db_=b.deadline?new Date(b.deadline):new Date('9999-12-31');return da-db_;});
  return l;
}

/* ========== RENDER ========== */
function rH(){
  document.getElementById('hSub').textContent=I.sub[L];
  document.getElementById('sBox').placeholder=I.search[L];
  document.getElementById('wBtn').textContent=I.wk[L];
  document.getElementById('tBtn').textContent=I.tn[L];
  document.getElementById('calT').textContent=I.cal[L];
  document.getElementById('lBtn').textContent=L==='zh'?'EN':'中';
  document.getElementById('emp').textContent=I.emp[L];
  const s=I.sb[L];for(let i=0;i<3;i++)document.getElementById('sl'+i).textContent=s[i];
}
function rT(){
  document.getElementById('tabs').innerHTML=CATS.map(c=>{
    const on=c.id===cat;const n=c.id==='all'?A.length:A.filter(a=>a.cat===c.id).length;
    if(c.id!=='all'&&n===0)return '';
    return `<button class="tab${on?' on':''}" onclick="sTab('${c.id}')"${on?' style="background:'+c.c+';border-color:'+c.c+'"':''}>${c[L]}${n>0&&c.id!=='all'?' '+n:''}</button>`;
  }).join('');
}
function rF(){
  const order=['timed','ongoing','series','single','reserve','walkin','nearby','indoor','outdoor'];
  let h=order.map(k=>{const t=TG[k];const on=tag===k;return `<button class="flt${on?' on':''}" onclick="sTg('${k}')" style="background:${t.bg};color:${t.c};">${t[L]}</button>`;}).join('');
  if(sf)h+=`<button class="flt-clr" onclick="cSf()">${I.clr[L]} ✕</button>`;
  document.getElementById('flts').innerHTML=h;
}
function rCal(){
  const up=A.filter(a=>!isX(a)&&(a.dateStart||a.deadline)).sort((a,b)=>new Date(a.dateStart||a.deadline)-new Date(b.dateStart||b.deadline)).slice(0,4);
  const bar=document.getElementById('calBar');
  if(!up.length){bar.style.display='none';return;}
  bar.style.display='block';
  document.getElementById('calI').innerHTML=up.map(a=>{
    const c=gc(a.cat);const dl=dTo(a.deadline);const u=dl!==null&&dl>0&&dl<=14;
    return `<div class="cal-i"><span class="cal-dot" style="background:${c}"></span><span class="cal-d">${db(a)}</span><span class="cal-n">${tx(a.name)}</span>${u?`<span class="cal-u">${dl}${I.dl[L]}</span>`:''}</div>`;
  }).join('');
}
function rC(){
  const l=gF();const el=document.getElementById('cds');const em=document.getElementById('emp');
  if(!l.length){el.innerHTML='';em.style.display='block';return;}
  em.style.display='none';
  el.innerHTML=l.map(a=>{
    const x=isX(a);const c=gc(a.cat);const dl=dTo(a.deadline);const u=dl!==null&&dl>0&&dl<=14;
    const sc=SC[a.status]||SC['未标记'];const op=eid===a.id;const d=db(a);
    const lt=LT[a.lead]?LT[a.lead][L]:'';
    const mp=[];if(a.dur)mp.push(tx(a.dur));if(a.age)mp.push(tx(a.age));if(a.price)mp.push(a.price);
    const lks=[];if(a.url)lks.push(`<a href="${a.url}" target="_blank" rel="noopener" class="lnk lnk-w">${I.web[L]}</a>`);
    if(a.xhs)lks.push(`<a href="${a.xhs}" class="lnk lnk-x">${I.xhs[L]}</a>`);
    const so=I.so[L];const sv=I.so.zh;
    const dc=x?'dead':a.tags.includes('ongoing')?'ongoing':'timed';
    const ft=a.tags.filter(t=>!['indoor','outdoor'].includes(t));
    const et=a.tags.filter(t=>['indoor','outdoor'].includes(t));
    return `<div class="cd${x?' exp':''}" style="border-left-color:${c}">
<div class="cd-sum" onclick="tgE(${a.id})">
<div class="cd-r1"><span class="cd-nm">${tx(a.name)}${x?' <span class="cd-ex">'+I.exp[L]+'</span>':''}</span>
<div class="cd-da">${d?`<div class="cd-db ${dc}">${d}</div>`:''}${u?`<div class="cd-urg">${dl}${I.dl[L]} ${I.su[L]}</div>`:''}</div></div>
<div class="cd-ven">${tx(a.venue)}</div>
<div class="cd-meta">${mp.join(' · ')}</div>
<div class="cd-tags"><div class="cd-tl">
${ft.map(t=>`<span class="pill" style="background:${TG[t].bg};color:${TG[t].c}">${TG[t][L]}</span>`).join('')}
${et.map(t=>`<span class="pill" style="background:${TG[t].bg};color:${TG[t].c}">${TG[t][L]}</span>`).join('')}
${lt?`<span class="lead">${lt}</span>`:''}
</div><span class="cd-hint">${op?I.less[L]:I.more[L]}</span></div>
</div>
${op?`<div class="cd-det">
${a.time?`<div class="det-r">${I.tm[L]}：${tx(a.time)}</div>`:''}
${a.dateStart?`<div class="det-r">${I.dt[L]}：${a.dateStart}${a.dateEnd?' → '+a.dateEnd:''}${a.deadline?'<br>'+I.ddl[L]+'：'+a.deadline:''}</div>`:''}
${a.note?`<div class="det-note">${tx(a.note)}</div>`:''}
<div class="det-addr"><a href="${gm(a.addr)}" target="_blank" rel="noopener"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${a.addr}</a></div>
<div class="det-foot"><div class="det-links">${lks.join('')}</div>
<select class="st-sel" onchange="sSt(${a.id},this.value);event.stopPropagation()" style="background:${sc.bg};color:${sc.c}">
${sv.map((s,i)=>`<option value="${s}"${a.status===s?' selected':''}>${so[i]}</option>`).join('')}
</select></div></div>`:''}
</div>`;
  }).join('');
}
function rSb(){
  const c={'感兴趣':0,'已报名':0,'已完成':0};
  A.forEach(a=>{if(c[a.status]!==undefined)c[a.status]++;});
  const k=['感兴趣','已报名','已完成'];
  k.forEach((s,i)=>{document.getElementById('sn'+i).textContent=c[s];document.getElementById('sn'+i).parentElement.style.opacity=sf===s?'1':sf?'0.3':'1';});
}
function rQ(){
  const w=document.getElementById('wBtn'),t=document.getElementById('tBtn');
  w.className='qbtn'+(qm==='wk'?' q-wk':'');
  t.className='qbtn'+(qm==='tn'?' q-tn':'');
}
function R(){rH();rT();rF();rCal();rC();rSb();rQ();}

/* ========== EVENTS ========== */
window.sTab=function(id){cat=id;tag=null;R();};
window.sTg=function(t){tag=tag===t?null:t;R();};
window.doSearch=function(v){q=v.trim();rC();};
window.tgE=function(id){eid=eid===id?null:id;rC();};
window.sSt=function(id,v){const a=A.find(x=>x.id===id);if(a){a.status=v;save();rC();rSb();}};
window.fSt=function(s){sf=sf===s?null:s;R();};
window.cSf=function(){sf=null;R();};
window.tgQ=function(m){qm=qm===m?null:m;R();};
window.tgLang=function(){L=L==='zh'?'en':'zh';R();};

R();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
